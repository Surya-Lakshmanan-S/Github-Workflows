name: PR Rule Engine

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  run-rules:
    name: Run PR Rules
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get changed files
        id: changed-files
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          echo "files=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | tr '\n' ',')" >> $GITHUB_OUTPUT

      - name: Build PR payload
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
        run: |
          python build_payload.py "${{ steps.changed-files.outputs.files }}"

      - name: Run rule engine
        id: run-rules
        run: |
          python runner.py pr_payload.json
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Write log file
        run: python log_writer.py pr_results.json

      - name: Commit log to branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git commit -m "ci: add PR rule validation log [skip ci]" || echo "Nothing to commit"
          git push origin ${{ github.event.pull_request.head.ref }}

      - name: Fail if rules failed
        if: steps.run-rules.outcome == 'failure'
        run: exit 1
